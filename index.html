<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Personalidad</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Test de Personalidad - Modelo de los Cinco Grandes</h1>
        <div id="intro">
            <p>Bienvenido al test de personalidad basado en el modelo de los Cinco Grandes factores: Extraversión, Amabilidad, Conciencia, Neuroticismo y Apertura. Responde las preguntas honestamente para obtener tu perfil.</p>
            <button id="start-btn">Comenzar Test</button>
        </div>
        <div id="test" style="display: none;">
            <div id="sections"></div>
            <button id="next-btn" style="display: none;">Siguiente</button>
            <button id="finish-btn" style="display: none;">Finalizar</button>
        </div>
        <div id="results" style="display: none;">
            <h2>Tu Perfil de Personalidad</h2>
            <div id="profile"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
